<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dot&coord lab — Under Construction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geo&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #080808;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: 0 0;
            color: #ffffff;
            font-family: 'Geo', sans-serif;
            cursor: none;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: relative;
            user-select: none;
        }

        .main-text {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 0.3rem;
            text-align: center;
            opacity: 0.9;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.3rem;
            opacity: 0.4;
            transition: opacity 0.3s ease, letter-spacing 0.3s ease;
            letter-spacing: 0.05rem;
        }

        .footer:hover {
            opacity: 0.9;
            letter-spacing: 0.15rem;
        }

        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 6px;
            height: 6px;
            background-color: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            will-change: transform, width, height;
        }

        #coords {
            position: absolute;
            left: 14px;
            bottom: 14px;
            font-size: 0.85rem;
            white-space: nowrap;
            opacity: 0.75;
            letter-spacing: 0.05rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-text">under construction</div>
        <div class="footer">
            <a href="https://github.com/placeholder" target="_blank">dot&coord lab</a>
        </div>
    </div>

    <div id="custom-cursor">
        <div id="coords">(0.000; 0.000)</div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const coords = document.getElementById('coords');

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cursorX = mouseX;
        let cursorY = mouseY;
        let lastCursorX = mouseX;
        let lastCursorY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function updateCursor() {
            const ease = 0.15; 
            
            cursorX += (mouseX - cursorX) * ease;
            cursorY += (mouseY - cursorY) * ease;

            const dx = cursorX - lastCursorX;
            const dy = cursorY - lastCursorY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            const baseSize = 6;
            const targetSize = baseSize + Math.min(distance * 1.5, 24);

            cursor.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0) translate(-50%, -50%)`;
            cursor.style.width = `${targetSize}px`;
            cursor.style.height = `${targetSize}px`;

            coords.textContent = `(${cursorX.toFixed(3)}; ${cursorY.toFixed(3)})`;

            lastCursorX = cursorX;
            lastCursorY = cursorY;

            requestAnimationFrame(updateCursor);
        }

        requestAnimationFrame(updateCursor);

        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
        });
        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
        });
    </script>
</body>
</html>
